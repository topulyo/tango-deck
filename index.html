<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tango Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--k:#1a1208;--p:#f5f0e8;--a:#e8dfc9;--g:#b8860b;--l:#5a4a35}
body{background:var(--p);color:var(--k);font-family:'DM Mono',monospace;min-height:100vh}
input,button,select,textarea{font-size:16px!important;font-family:'DM Mono',monospace}
button{touch-action:manipulation;cursor:pointer}
#main{max-width:520px;margin:0 auto}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{text-align:center;padding:20px 16px 0;border-bottom:2px dashed var(--k)}
.hk{font-size:11px;letter-spacing:4px;color:var(--g);display:block}
.hdr h1{font-family:'Shippori Mincho',serif;font-size:36px;font-weight:800;line-height:1}
.hs{font-size:10px;letter-spacing:2px;color:var(--l);margin:4px 0 12px;display:block}
.score-wrap{display:inline-flex;flex-direction:column;align-items:center;padding:4px 16px 12px;cursor:pointer}
.score-num{font-family:'Shippori Mincho',serif;font-size:48px;font-weight:800;color:var(--g);line-height:1}
.score-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g);opacity:.8}
.tabs{display:flex;border-top:2px solid var(--k);border-bottom:2px solid var(--k)}
.tb{flex:1;padding:11px 0;background:none;border:none;border-right:1.5px solid var(--k);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--l)}
.tb:last-child{border-right:none}
.tb.on{background:var(--k);color:var(--p)}
.tc{padding:16px}
.df{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fb{flex:1;padding:8px;background:none;border:1.5px solid var(--k);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--l);min-width:70px}
.fb.on{background:var(--k);color:var(--p)}
.sc{font-size:11px;letter-spacing:1px;color:var(--g);padding:4px 8px;border:1px solid var(--g)}
.rv{padding:8px 14px;background:none;border:1.5px solid var(--g);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--g)}
.rv.on{background:var(--g);color:var(--p)}
.card-scene{position:relative;height:280px;margin:12px 0;user-select:none}
.card-shell{position:absolute;inset:0;will-change:transform}
.card{width:100%;height:100%;border:2px solid var(--k);background:linear-gradient(145deg,var(--p) 60%,var(--a));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;position:relative}
.card-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g);position:absolute;top:14px;left:50%;transform:translateX(-50%);white-space:nowrap}
.card-star{position:absolute;top:10px;right:12px;background:none;border:none;font-size:22px;color:var(--g);padding:4px}
.card-nav-l,.card-nav-r{position:absolute;top:50%;width:32px;height:60px;background:var(--k);color:var(--p);border:none;font-size:16px;opacity:0;transition:opacity .2s}
.card-nav-l{left:-1px;transform:translateY(-50%)}
.card-nav-r{right:-1px;transform:translateY(-50%)}
.card-word{font-family:'Shippori Mincho',serif;font-size:34px;font-weight:600;color:var(--k);text-align:center;line-height:1.2}
.card-hint{font-size:10px;letter-spacing:2px;color:var(--l);position:absolute;bottom:14px}
.card-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:4px}
.cn{width:44px;height:44px;background:var(--k);color:var(--p);border:none;font-size:18px}
.card-pos{font-size:11px;letter-spacing:2px;color:var(--l)}
.inp{width:100%;border:1.5px solid var(--k);background:var(--p);padding:10px 12px;font-size:13px;color:var(--k);outline:none}
.inp:focus{border-color:var(--g)}
.sheet{width:100%;border-collapse:collapse;font-size:12px}
.sheet th{background:var(--k);color:var(--p);padding:6px 8px;text-align:left;font-weight:400;letter-spacing:1px;font-size:10px}
.sheet td{padding:6px 8px;border-bottom:1px solid var(--a)}
.sheet tr:nth-child(even) td{background:rgba(0,0,0,.03)}
.sheet tr.editing td{background:#fff8ef}
.eb,.db,.rsb,.esb,.ecb{background:none;border:none;font-size:13px;padding:2px 4px;color:var(--l)}
.rsb.on{color:var(--g)}
.sei{width:100%;border:1px solid var(--g);background:var(--p);padding:3px 6px;font-size:12px}
.add-btn{width:100%;padding:12px;background:var(--k);color:var(--p);border:none;font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.inp-label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--l);margin-bottom:4px;margin-top:10px}
.msg{font-size:11px;color:var(--g);letter-spacing:1px;margin-top:8px;min-height:18px}
.ttabs{display:flex;border:1.5px solid var(--k);margin-bottom:16px}
.tt{flex:1;padding:9px;background:none;border:none;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--l);border-right:1.5px solid var(--k)}
.tt:last-child{border-right:none}
.tt.on{background:var(--k);color:var(--p)}
.tier-btn{width:100%;padding:12px 14px;background:none;border:1.5px solid var(--k);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--k);text-align:left;margin-bottom:8px}
.tbar{height:3px;background:var(--a);margin:6px 0 4px}
.tbar-fill{height:100%;background:var(--g)}
.tsub{font-size:9px;color:var(--l);letter-spacing:1px}
.ob-card{border:2px solid var(--k);padding:40px 24px;text-align:center;background:linear-gradient(145deg,var(--p) 60%,var(--a));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:180px;margin:12px 0}
.ob-word{font-family:'Shippori Mincho',serif;font-size:34px;font-weight:600;color:var(--k)}
.ob-eng{font-size:14px;color:var(--l);font-style:italic}
.ob-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g)}
.ob-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.ob-skip{padding:14px;background:none;border:2px solid var(--k);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--k)}
.ob-know{padding:14px;background:var(--k);border:2px solid var(--k);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--p)}
.pbar{height:4px;background:var(--a);margin:10px 0 6px}
.pbar-fill{height:100%;background:var(--g);transition:width .3s}
.plabel{font-size:10px;letter-spacing:2px;color:var(--l);text-align:center}
.quiz-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1.5px solid var(--a);margin-bottom:12px}
.q-back,.q-rev{background:none;border:1px solid var(--k);font-size:10px;letter-spacing:1px;padding:6px 10px;text-transform:uppercase;color:var(--k)}
.q-rev.on{background:var(--g);border-color:var(--g);color:var(--p)}
.q-prog-wrap{text-align:center}
.q-prog{font-size:18px;font-weight:bold;letter-spacing:1px;color:var(--k);display:block}
.q-total{font-size:9px;letter-spacing:1px;color:var(--g);display:block;margin-top:2px}
.q-bar{height:3px;background:var(--a);margin-bottom:12px}
.q-bar-fill{height:100%;background:var(--g);transition:width .3s}
.q-score{display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:13px}
.q-ok{color:#27ae60}.q-no{color:#c0392b}
.q-card{border:2px solid var(--k);padding:32px 20px;text-align:center;background:linear-gradient(145deg,var(--p) 60%,var(--a));margin-bottom:12px}
.q-qlabel{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--g);display:block;margin-bottom:10px}
.q-word{font-family:'Shippori Mincho',serif;font-size:28px;font-weight:600;color:var(--k)}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{padding:12px 8px;background:none;border:1.5px solid var(--k);font-size:12px;text-align:left;color:var(--k);display:flex;align-items:center;gap:8px}
.mc.right{background:#e8f8e8;border-color:#27ae60;color:#27ae60}
.mc.wrong{background:#fde8e8;border-color:#c0392b;color:#c0392b}
.mc.dim{opacity:.4}
.mc-letter{font-size:10px;opacity:.6;min-width:14px}
.q-fb{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1.5px solid var(--a)}
.fb-ok{color:#27ae60;font-size:13px;letter-spacing:1px}
.fb-no{color:#c0392b;font-size:13px;letter-spacing:1px}
.q-next{background:var(--k);color:var(--p);border:none;font-size:11px;letter-spacing:2px;padding:8px 16px;text-transform:uppercase}
.result{padding:20px 0}
.result-pct{font-family:'Shippori Mincho',serif;font-size:64px;font-weight:800;text-align:center;color:var(--k);line-height:1}
.result-lbl{text-align:center;font-size:12px;letter-spacing:2px;color:var(--l);margin:6px 0 12px}
.result-bar{height:4px;background:var(--a);margin:0 0 16px}
.result-bar-fill{height:100%;background:var(--g)}
.result-msg{text-align:center;font-size:13px;color:var(--l);margin-bottom:16px}
.missed-list{border:1.5px solid var(--a);padding:12px;margin-bottom:16px}
.missed-hdr{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:8px}
.missed-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--a);font-size:12px}
.missed-rom{color:var(--g);margin-left:auto}
.ract{display:flex;flex-direction:column;gap:8px}
.rbtn{padding:13px;border:none;font-size:12px;letter-spacing:2px;text-transform:uppercase;width:100%}
.rbtn.dark{background:var(--k);color:var(--p)}
.rbtn.gold{background:var(--g);color:var(--p)}
.rbtn.ghost{background:none;border:1.5px solid var(--k);color:var(--k)}
.celeb{text-align:center;padding:20px;border:2px solid var(--g);margin-bottom:16px;background:linear-gradient(145deg,var(--p) 60%,var(--a))}
.celeb-icon{font-size:32px;margin-bottom:8px}
.celeb-title{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:800;color:var(--k)}
.celeb-sub{font-size:11px;letter-spacing:2px;color:var(--g);margin-top:4px}
.ai-note{font-size:11px;color:var(--l);line-height:1.6;margin-bottom:12px;letter-spacing:.5px}
.ask-row{display:flex;gap:8px;margin-bottom:12px}
.ask-btn{padding:10px 16px;background:var(--k);color:var(--p);border:none;font-size:12px;letter-spacing:2px;white-space:nowrap}
.ai-lbl{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:10px}
.pb{padding:16px;border:1.5px solid #ccc3b0;margin-bottom:12px}
.pb-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:8px}
.pb-main{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600;color:var(--k);line-height:1.6;margin-bottom:6px}
.pb-tr{font-size:12px;color:var(--l);font-style:italic}
.wg{display:flex;flex-wrap:wrap;gap:5px;margin:10px 0;padding-top:10px;border-top:1px solid #e0d8c8}
.wgi{display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.05);padding:6px 10px;min-width:55px}
.wgi-r{font-size:14px;margin-bottom:3px}
.wgi-e{font-size:9px;color:var(--l);text-align:center}
.wu{color:var(--g);font-weight:bold;cursor:pointer;border-bottom:2px dashed var(--g);padding-bottom:1px}
.wpop{position:fixed;background:var(--k);color:var(--p);padding:10px 14px;font-size:11px;white-space:nowrap;z-index:9999;border:1.5px solid var(--g);display:flex;flex-direction:column;align-items:center;gap:8px;min-width:150px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.wpop-e{font-style:italic;color:var(--g);font-size:10px}
.wpop-add{background:var(--g);border:none;color:var(--k);font-size:10px;padding:6px 14px;width:100%;letter-spacing:1px}
.logw{margin-top:16px;border-top:1.5px solid var(--a);padding-top:12px}
.logh{display:flex;align-items:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--l);margin-bottom:8px}
.logcl{background:none;border:none;font-size:10px;color:#c0392b;letter-spacing:1px;text-decoration:underline;margin-left:auto;padding:0;cursor:pointer}
.logr{border-bottom:1px solid var(--a);padding:8px 0}
.logq{font-size:12px;font-style:italic;color:var(--k)}
.logm{display:flex;align-items:center;font-size:10px;color:var(--l);margin-top:2px}
.logt{background:none;border:none;font-size:10px;color:var(--g);padding:0;margin-left:auto;cursor:pointer}
.loga{font-size:11px;color:var(--l);line-height:1.7;padding:8px 0;white-space:pre-wrap}
.empty{text-align:center;padding:48px 0;color:var(--l);font-size:13px;letter-spacing:1px}
.dots span{animation:blink 1.2s infinite}.dots span:nth-child(2){animation-delay:.4s}.dots span:nth-child(3){animation-delay:.8s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>

function bindCard(){
  var sc=document.getElementById('cScene');if(!sc)return;
  var sh=document.getElementById('cShell'),shL=document.getElementById('cL'),shR=document.getElementById('cR');
  var sX=null,sY=null,locked=false,moved=false,dx=0,mA=false,tH=false,TH=60;
  function gS(x,y){sX=x;sY=y;locked=false;moved=false;dx=0;}
  function gM(x,y,ev){
    if(sX===null)return;
    var ddx=x-sX,ddy=y-sY;
    if(!locked){if(Math.abs(ddx)>=Math.abs(ddy))locked=true;else{sX=null;return;}}
    if(ev&&ev.cancelable)ev.preventDefault();
    moved=true;dx=ddx;
    var tilt=Math.min(Math.max(dx/10,-12),12),op=1-Math.min(Math.abs(dx)/320,.35),sp=Math.min(Math.abs(dx)/TH,1);
    if(sh){sh.style.transform='translateX('+dx+'px) rotate('+tilt+'deg)';sh.style.opacity=op;}
    if(shL)shL.style.opacity=dx<-20?sp:0;
    if(shR)shR.style.opacity=dx>20?sp:0;

    } else if(!moved&&!locked){if(ft)tH=true;flipped=!flipped;renderCards();}

  }

  sc.addEventListener('touchmove',function(e){gM(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});
  sc.addEventListener('touchend',function(e){e.preventDefault();gE(true);},{passive:false});

  sc.addEventListener('mouseup',function(){if(!mA)return;mA=false;gE(false);});

function startQuiz(mode){
  quizMode=mode;
  var src=mode==='starred'?vocab.filter(function(w){return starred.has(w.id);}):vocab;
  if(!src.length){alert('No words!');return;}
  var seen=new Set();
  try{seen=new Set(JSON.parse(lsGet(QK)||'[]').map(Number));}catch(e){}
  var srcIds=new Set(src.map(function(w){return Number(w.id);}));
  seen=new Set([...seen].filter(function(id){return srcIds.has(id);}));
  var unseen=src.filter(function(w){return !seen.has(Number(w.id));});
  quizCycleComplete=false;
  if(!unseen.length){quizCycleComplete=true;seen=new Set();lsSet(QK,'[]');unseen=[...src];}
  quizStartPos=seen.size;
  var sh=[...unseen].sort(function(){return Math.random()-.5;});
  quizBatch=sh.slice(0,50);
  quizBatch.forEach(function(w){seen.add(Number(w.id));});
  lsSet(QK,JSON.stringify([...seen]));
  quizIdx=0;quizScores=[];quizSelected=null;quizActive=true;
  quizChoices=makeChoices(quizBatch[0],quizReversed);
  renderQuiz();

function makeChoices(correct,rev){
  var pool=vocab.filter(function(w){return w.id!==correct.id;}).sort(function(){return Math.random()-.5;}).slice(0,3);
  return [...pool,correct].sort(function(){return Math.random()-.5;}).map(function(w){
    return {id:w.id,label:rev?w.english:(w.romaji||w.japanese),correct:w.id===correct.id};
  });
}

    var cl='mc'+(quizSelected!==null?(c.correct?' right':c.id===quizSelected?' wrong':' dim'):'');
    return '<button class="'+cl+'" data-cid="'+c.id+'" onclick="pickChoice(this)"><span class="mc-letter">'+['A','B','C','D'][i]+'</span><span>'+esc(c.label)+'</span></button>';
  }).join('');
  var sc=quizSelected!==null?quizChoices.find(function(c){return c.id===quizSelected;}):null;

    +(sc&&sc.correct?'<span class="fb-ok">&#10003; correct!</span>':'<span class="fb-no">&#10007; '+esc(cc?cc.label:'')+'</span>')
    +'<button class="q-next" onclick="nextQuiz()">'+(quizIdx+1>=quizBatch.length?'results &rarr;':'next &rarr;')+'</button></div>':'';
  document.getElementById('tab-quiz').innerHTML='<div class="tc">'
    +'<div class="quiz-top">'
    +'<button class="q-back" onclick="quizActive=false;renderQuizEntry()">&larr; back</button>'
    +'<div class="q-prog-wrap"><span class="q-prog">'+(quizIdx+1)+' / '+quizBatch.length+'</span>'
    +'<span class="q-total">'+Math.min(quizStartPos+quizIdx+1,vocab.length)+' / '+vocab.length+'</span></div>'
    +'<button class="q-rev'+(quizReversed?' on':'')+'" onclick="toggleQuizRev()">'+(quizReversed?'Rom&rarr;En':'En&rarr;Rom')+'</button>'
    +'</div>'
    +'<div class="q-bar"><div class="q-bar-fill" style="width:'+Math.round(quizIdx/quizBatch.length*100)+'%"></div></div>'
    +'<div class="q-score"><span class="q-ok">&#10003; '+quizScores.filter(Boolean).length+'</span><span class="q-no">&#10007; '+quizScores.filter(function(v){return !v;}).length+'</span>'
    +'<button class="rsb'+(isS?' on':'')+'" style="font-size:18px;margin-left:auto" onclick="starQuiz('+cur.id+')">'+(isS?'&#9733;':'&#9734;')+'</button></div>'
    +'<div class="q-card"><span class="q-qlabel">'+ql+'</span><div class="q-word">'+esc(q)+'</div></div>'
    +'<div class="mc-grid">'+ch+'</div>'+fb+'</div>';
}
function pickChoice(btn){
  if(quizSelected!==null){nextQuiz();return;}
  var id=parseInt(btn.dataset.cid);quizSelected=id;
  var c=quizChoices.find(function(c){return c.id===id;});
  var correct=c?c.correct:false;
  quizScores.push(correct);
  if(!correct){starred.add(quizBatch[quizIdx].id);saveStarred();}
  renderQuiz();
}
function nextQuiz(){
  quizIdx++;
  if(quizIdx>=quizBatch.length){renderResult();return;}
  quizSelected=null;quizChoices=makeChoices(quizBatch[quizIdx],quizReversed);renderQuiz();
}
function toggleQuizRev(){quizReversed=!quizReversed;if(quizBatch[quizIdx])quizChoices=makeChoices(quizBatch[quizIdx],quizReversed);renderQuiz();}
function starQuiz(id){starred.has(id)?starred.delete(id):starred.add(id);saveStarred();renderQuiz();}
function renderResult(){
  var c=quizScores.filter(Boolean).length,pct=Math.round(c/quizScores.length*100)||0;
  var missed=quizBatch.filter(function(_,i){return quizScores[i]===false;});
  var msg=pct===100?'Perfect! &#127881; Flawless!':pct>=80?'Great work! &#128170;':pct>=60?'Good effort &mdash; keep going!':'Don\'t give up &mdash; missed words were starred!';
  var total=quizStartPos+quizBatch.length;
  var celebHtml=quizCycleComplete
    ?('<div style="text-align:center;padding:28px 16px;background:linear-gradient(135deg,#fff8ef,#f5ead5,#fff8ef);border:2px solid var(--g);margin-bottom:20px">'
    +'<div style="font-size:48px;margin-bottom:10px">&#127881; &#11088; &#127882;</div>'
    +'<div style="font-size:28px;font-weight:800;color:var(--k);margin-bottom:6px">Deck Complete!</div>'
    +'<div style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:10px">You did it!</div>'
    +'<div style="font-size:52px;font-weight:800;color:var(--g);line-height:1">'+vocab.length+'</div>'
    +'<div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--l);margin-bottom:12px">words mastered</div>'
    +'<div style="font-size:12px;color:var(--l);letter-spacing:1px">Starting a fresh new cycle...</div>'
    +'</div>')
    :'';
  var progHtml=!quizCycleComplete?'<div style="font-size:11px;letter-spacing:1px;color:var(--l);text-align:center;margin-bottom:12px">'+total+' / '+vocab.length+' words seen this cycle</div>':'';
  var mHtml=missed.length?'<div class="missed-list"><div class="missed-hdr">missed ('+missed.length+') &mdash; auto-starred &#9733;</div>'
    +missed.map(function(w){return '<div class="missed-row"><span>'+esc(w.english)+'</span><span class="missed-rom">'+esc(w.romaji||w.japanese)+'</span><button class="rsb'+(starred.has(w.id)?' on':'')+'" data-mid="'+w.id+'" onclick="starMissed(this)">'+(starred.has(w.id)?'&#9733;':'&#9734;')+'</button></div>';}).join('')+'</div>':'';
  document.getElementById('tab-quiz').innerHTML='<div class="tc"><div class="result">'
    +celebHtml+progHtml
    +'<div class="result-pct">'+pct+'%</div>'
    +'<div class="result-lbl">'+c+' / '+quizScores.length+' correct</div>'
    +'<div class="result-bar"><div class="result-bar-fill" style="width:'+pct+'%"></div></div>'
    +'<p class="result-msg">'+msg+'</p>'
    +mHtml
    +'<div class="ract"><button class="rbtn dark" onclick="startQuiz(quizMode)">next 50 words &rarr;</button>'
    +(missed.length?'<button class="rbtn gold" onclick="startQuiz(\'starred\')">drill &#9733; missed words</button>':'')
    +'<button class="rbtn ghost" onclick="quizActive=false;renderQuizEntry()">&larr; back</button>'
    +'</div></div></div>';
}
function starMissed(btn){
  var id=parseInt(btn.dataset.mid);starred.has(id)?starred.delete(id):starred.add(id);
  saveStarred();btn.className='rsb'+(starred.has(id)?' on':'');btn.innerHTML=starred.has(id)?'&#9733;':'&#9734;';
}

function loadMyWords(){vocab=SEED.slice();save();updateScore();resetDeck();renderCards();}
function launchApp(){
  document.getElementById('main').innerHTML=
    '<div class="app">'
    +'<header class="hdr">'
    +'<span class="hk">&#26085;&#26412;&#35486; &middot; &#12501;&#12521;&#12483;&#12471;&#12517;&#12459;&#12540;&#12489;</span>'
    +'<h1>Tango Deck</h1>'
    +'<span class="hs">your personal japanese vocabulary</span>'
    +'<div class="score-wrap" onclick="loadMyWords()" title="tap to reset to 399 words">'
    +'<div class="score-num" id="vcBtn">0</div>'
    +'<div class="score-label">words known</div>'
    +'</div>'
    +'</header>'
    +'<nav class="tabs">'
    +'<button class="tb on" onclick="showTab(\'cards\')">&#x2726; cards</button>'
    +'<button class="tb" onclick="showTab(\'quiz\')">&#x25CE; quiz</button>'
    +'<button class="tb" onclick="showTab(\'add\')">&#xFF0B; add</button>'
    +'<button class="tb" onclick="showTab(\'ask\')">&#x2295; ask</button>'
    +'</nav>'
    +'<div id="tab-cards"></div>'
    +'<div id="tab-quiz" style="display:none"></div>'
    +'<div id="tab-add" style="display:none"></div>'
    +'<div id="tab-ask" style="display:none"></div>'
    +'</div>';
  setTimeout(function(){
    updateScore();resetDeck();showTab('cards');
  },50);
}

load();
launchApp();

</script>
</body>
</html>
